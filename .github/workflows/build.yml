name: Build,Analyze,scan
on:
  push:
    branches:
      - main
jobs:
  build-analyze-scan:
    name: Build
    runs-on: [self-hosted]
    steps:
      - name: Checkout code
        uses: actions/checkout@v2
        with:
          fetch-depth: 0  # Shallow clones should be disabled for a better relevancy of analysis
      - name: Build and analyze with SonarQube
        uses: sonarsource/sonarqube-scan-action@master
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}

      - name: npm install
        run: npm install
      
      - name: Trivy file scan
        run: trivy fs . > trivy_scan_results.txt

      - name: Docker Build and push 
        run: |
          docker build -t tic-tac-toe .
          docker tag tic-tac-toe akshaybk/tic-tac-toe:latest
          echo ${{ secrets.DOCKERHUB_TOKEN }} | docker login -u ${{ secrets.DOCKER_USERNAME }} --password-stdin
          docker push akshaybk/tic-tac-toe:latest
        env: 
          DOCKER_CLI_ACI: 1

      - name: Trivy Docker image scan
        run: trivy image akshaybk/tic-tac-toe:latest > trivy_image_scan_results.txt
  
  deploy:
    needs: build-analyze-scan
    runs-on: [self-hosted]
    steps:
      - name: Deploy to docker
        run: |
          docker pull akshaybk/tic-tac-toe:latest
          docker run -d -p 3000:3000 akshaybk/tic-tac-toe:latest
        env: 
          DOCKER_CLI_ACI: 1 